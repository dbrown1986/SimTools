name: Build and Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: windows-latest
    strategy:
      matrix:
        platform: [x86, x64]
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Setup NuGet
        uses: NuGet/setup-nuget@v2

      - name: Restore dependencies
        run: nuget restore SimTools.sln

      # Build SimToolsApp for both platforms
      - name: Build SimToolsApp
        run: >
          msbuild SimTools.sln 
          /p:Configuration=Release 
          /p:Platform=${{ matrix.platform }} 
          /t:SimToolsApp

      # Build everything else ONLY for x86
      - name: Build Remaining Projects (x86 only)
        if: matrix.platform == 'x86'
        run: >
          msbuild SimTools.sln 
          /p:Configuration=Release 
          /p:Platform=x86

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            **/bin/Release/*.exe
            **/bin/Release/*.dll
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
