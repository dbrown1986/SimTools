name: Build and Release

on:
  push:
    branches:
      - master

jobs:
  build:
    runs-on: windows-latest
    strategy:
      matrix:
        platform: [x86, x64]
    permissions:
      contents: write
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Setup NuGet
        uses: NuGet/setup-nuget@v2

      - name: Restore dependencies
        run: nuget restore SimTools.sln

      # Build SimToolsApp for both platforms (enabling single-file publishing if desired)
      - name: Build SimToolsApp
        run: >
          msbuild SimTools.sln 
          /p:Configuration=Release 
          /p:Platform=${{ matrix.platform }} 
          /t:SimToolsApp

      # Build remaining projects ONLY for x86
      - name: Build Remaining Projects (x86 only)
        if: matrix.platform == 'x86'
        run: >
          msbuild SimTools.sln 
          /p:Configuration=Release 
          /p:Platform=x86 
          /p:PublishSingleFile=true

      - name: Package all outputs dynamically
        shell: powershell
        run: |
          New-Item -ItemType Directory -Path "staging" -Force
          
          # Find all release output directories matching the current platform matrix
          $targetPath = "*bin\${{ matrix.platform }}\Release\net6.0-windows\*"
          $outputDirs = Get-ChildItem -Path . -Recurse -Directory | Where-Object { $_.FullName -like $targetPath }

          foreach ($dir in $outputDirs) {
              # Get the parent project folder name to use as the archive name
              $projectName = $dir.Parent.Parent.Parent.Name
              
              # If it's a multi-project layout, ensure we don't grab generic 'bin' paths improperly
              if ($dir.Name -match "net\d+\.\d+") {
                  $zipName = "staging\${{ matrix.platform }}-${{ github.sha }}.zip" # Fallback pattern if needed
                  # Better yet, name it after the project folder containing the .csproj
                  $projFile = Get-ChildItem -Path $dir.Parent.Parent.Parent -Filter "*.csproj" | Select-Object -First 1
                  if ($projFile) {
                      $projectName = $projFile.BaseName
                  }
                  
                  $destZip = "staging\$projectName-${{ matrix.platform }}.zip"
                  Write-Child "Compressing $projectName for ${{ matrix.platform }}..."
                  Compress-Archive -Path "$($dir.FullName)\*" -DestinationPath $destZip -Force
              }
          }

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest-${{ github.run_id }}
          files: staging/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
