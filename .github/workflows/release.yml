name: Build and Release

on:
  push:
    branches:
      - master

jobs:
  build:
    runs-on: windows-latest
    strategy:
      matrix:
        platform: [x86, x64]
    
    outputs:
      release_tag: ${{ steps.version.outputs.TAG }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Setup NuGet
        uses: NuGet/setup-nuget@v2

      - name: Extract Version, Build Counter, and Datestamp
        id: version
        shell: powershell
        run: |
          # Read base version using robust XML selection to handle namespaces
          $csprojPath = Get-ChildItem -Recurse -Filter "SimToolsApp.csproj" | Select-Object -First 1 -ExpandProperty FullName
          [xml]$csproj = Get-Content $csprojPath
          
          $baseVersion = $null
          $baseVersionNode = Select-Xml -Xml $csproj -XPath "//*[local-name()='BaseVersion']" | Select-Object -First 1
          if ($baseVersionNode) {
              $baseVersion = $baseVersionNode.Node.InnerText.Trim()
          } else {
              $versionNode = Select-Xml -Xml $csproj -XPath "//*[local-name()='Version']" | Select-Object -First 1
              if ($versionNode) {
                  $baseVersion = $versionNode.Node.InnerText.Trim()
              }
          }

          if (-not $baseVersion) {
              $baseVersion = "1.0.0"
          }

          # Read build counter or fallback to run number
          $counterPath = Get-ChildItem -Recurse -Filter "build.counter" | Select-Object -First 1 -ExpandProperty FullName
          if ($counterPath -and (Test-Path $counterPath)) {
              $buildCount = (Get-Content $counterPath).Trim()
          } else {
              $buildCount = "${{ github.run_number }}"
          }

          # Generate a unique datestamp to prevent existing tag collisions
          $dateStamp = Get-Date -Format "yyyyMMdd-HHmmss"

          # Construct tag with version, build count, and datestamp
          $tag = "SimTools-$baseVersion.$buildCount-$dateStamp"
          Write-Output "Generated Release Tag: $tag"
          echo "TAG=$tag" >> $env:GITHUB_OUTPUT

      - name: Restore dependencies
        run: nuget restore SimTools.sln

      # Build SimToolsApp (multi-file output)
      - name: Build SimToolsApp
        run: >
          msbuild SimTools.sln 
          /p:Configuration=Release 
          /p:Platform=${{ matrix.platform }} 
          /p:PublishSingleFile=false
          /t:SimToolsApp

      # Build remaining projects (single-file publishing enabled for utilities)
      - name: Build Remaining Projects (x86 only)
        if: matrix.platform == 'x86'
        run: >
          msbuild SimTools.sln 
          /p:Configuration=Release 
          /p:Platform=x86 
          /p:PublishSingleFile=true

      - name: Package artifacts
        shell: powershell
        run: |
          New-Item -ItemType Directory -Path "staging" -Force
          
          $netPath = "bin\${{ matrix.platform }}\Release\net6.0-windows"
          $projectDirs = Get-ChildItem -Path . -Recurse -Directory | Where-Object { Test-Path "$($_.FullName)\$netPath" }

          foreach ($projDir in $projectDirs) {
              $projectName = $projDir.Name
              $sourceBinPath = "$($projDir.FullName)\$netPath"
              
              # Explicit rule sets based on project requirements
              $zipProjects = @("SimToolsApp", "SimToolsRepoMaker")
              
              if ($zipProjects -contains $projectName) {
                  $destZip = "staging\$projectName-${{ matrix.platform }}.zip"
                  Write-Output "Compressing multi-file project $projectName for ${{ matrix.platform }}..."
                  Compress-Archive -Path "$sourceBinPath\*" -DestinationPath $destZip -Force
              } else {
                  # Copy single-file standalone executable
                  $exeFiles = Get-ChildItem -Path $sourceBinPath -Filter "$projectName.exe"
                  if ($exeFiles.Count -eq 0) {
                      # Fallback to any exe if exact name match varies slightly
                      $exeFiles = Get-ChildItem -Path $sourceBinPath -Filter "*.exe"
                  }
                  
                  if ($exeFiles.Count -eq 1) {
                      $sourceExe = $exeFiles[0].FullName
                      $destExe = "staging\$projectName-${{ matrix.platform }}.exe"
                      Write-Output "Copying single-file executable for $projectName (${{ matrix.platform }})..."
                      Copy-Item -Path $sourceExe -Destination $destExe -Force
                  } else {
                      # Fallback safety: zip it if single-file expectations aren't met
                      $destZip = "staging\$projectName-${{ matrix.platform }}.zip"
                      Write-Output "Fallback: Compressing $projectName for ${{ matrix.platform }}..."
                      Compress-Archive -Path "$sourceBinPath\*" -DestinationPath $destZip -Force
                  }
              }
          }

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-artifacts-${{ matrix.platform }}
          path: staging/*

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download All Artifacts
        uses: actions/download-artifact@v4
        with:
          path: all-releases
          merge-multiple: true

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.build.outputs.release_tag }}
          name: Release ${{ needs.build.outputs.release_tag }}
          files: all-releases/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
