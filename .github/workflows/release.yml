name: Build and Release

on:
  push:
    branches:
      - master

jobs:
  build:
    runs-on: windows-latest
    strategy:
      matrix:
        platform: [x86, x64]
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Setup NuGet
        uses: NuGet/setup-nuget@v2

      - name: Restore dependencies
        run: nuget restore SimTools.sln

      # Build SimToolsApp for current matrix platform
      - name: Build SimToolsApp
        run: >
          msbuild SimTools.sln 
          /p:Configuration=Release 
          /p:Platform=${{ matrix.platform }} 
          /t:SimToolsApp

      # Build remaining projects ONLY during the x86 pass
      - name: Build Remaining Projects (x86 only)
        if: matrix.platform == 'x86'
        run: >
          msbuild SimTools.sln 
          /p:Configuration=Release 
          /p:Platform=x86 
          /p:PublishSingleFile=true

      - name: Package artifacts
        shell: powershell
        run: |
          New-Item -ItemType Directory -Path "staging" -Force
          
          # Find all project folders containing a bin\<platform>\Release\net6.0-windows path
          $netPath = "bin\${{ matrix.platform }}\Release\net6.0-windows"
          $projectDirs = Get-ChildItem -Path . -Recurse -Directory | Where-Object { Test-Path "$($_.FullName)\$netPath" }

          foreach ($projDir in $projectDirs) {
              $projectName = $projDir.Name
              $sourceBinPath = "$($projDir.FullName)\$netPath"
              $destZip = "staging\$projectName-${{ matrix.platform }}.zip"
              
              Write-Output "Compressing $projectName for ${{ matrix.platform }}..."
              Compress-Archive -Path "$sourceBinPath\*" -DestinationPath $destZip -Force
          }

      # Upload the packaged zips to GitHub Actions internal storage
      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-artifacts-${{ matrix.platform }}
          path: staging/*

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      # Download artifacts from both the x86 and x64 build jobs into a single directory
      - name: Download All Artifacts
        uses: actions/download-artifact@v4
        with:
          path: all-releases
          merge-multiple: true

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest-${{ github.run_id }}
          files: all-releases/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
