name: Build and Release

on:
  push:
    branches:
      - master 

jobs:
  build:
    runs-on: windows-latest
    strategy:
      matrix:
        platform: [x86, x64]
    permissions:
      contents: write
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Setup NuGet
        uses: NuGet/setup-nuget@v2

      - name: Restore dependencies
        run: nuget restore SimTools.sln

      # Build SimToolsApp
      - name: Build SimToolsApp
        run: >
          msbuild SimTools.sln 
          /p:Configuration=Release 
          /p:Platform=${{ matrix.platform }} 
          /t:SimToolsApp

      # Build remaining projects
      - name: Build Remaining Projects (x86 only)
        if: matrix.platform == 'x86'
        run: >
          msbuild SimTools.sln 
          /p:Configuration=Release 
          /p:Platform=x86

      # This step ensures the files are actually captured
      - name: Upload Binaries
        uses: actions/upload-artifact@v4
        with:
          name: binaries-${{ matrix.platform }}
          path: |
            **/bin/Release/*.exe
            **/bin/Release/*.dll
            **/bin/Release/Dependencies/*.dll
            **/bin/Release/Languages/*.lang
            **/bin/Release/Resources/Music/*.txt
            **/bin/Release/Resources/Music/*.m4a

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          # We use the explicit path from the build to ensure it finds them
          files: |
            **/bin/Release/*.exe
            **/bin/Release/*.dll
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
