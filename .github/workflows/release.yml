name: Build and Release

on:
  push:
    branches:
      - master 

jobs:
  build:
    runs-on: windows-latest
    strategy:
      matrix:
        platform: [x86, x64]
    permissions:
      contents: write
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Setup NuGet
        uses: NuGet/setup-nuget@v2

      - name: Restore dependencies
        run: nuget restore SimTools.sln

      # Build SimToolsApp
      - name: Build SimToolsApp
        run: >
          msbuild SimTools.sln 
          /p:Configuration=Release 
          /p:Platform=${{ matrix.platform }} 
          /t:SimToolsApp

      # Build remaining projects
      - name: Build Remaining Projects (x86 only)
        if: matrix.platform == 'x86'
        run: >
          msbuild SimTools.sln 
          /p:Configuration=Release 
          /p:Platform=x86

      # This step ensures the files are actually captured
      - name: Copy binaries to staging
        run: |
          mkdir staging
          Get-ChildItem -Path . -Include *.exe,*.dll,*.lang,*.txt,*.m4a,*.json -Recurse | 
          Where-Object { $_.FullName -like "*bin\x86\Release\net6.0-windows*" } | 
          Copy-Item -Destination staging

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest-${{ github.run_id }}
          files: staging/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
