name: Build

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      # Adds full MSBuild capability to the runner environment
      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Restore dependencies
        run: dotnet restore SimTools.sln

      # Uses MSBuild instead of 'dotnet build' to support ResolveComReference
      - name: Build
        run: msbuild SimTools.sln /p:Configuration=Release /p:NoRestore=true
